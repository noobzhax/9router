name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3). If empty, release-please auto-detects from commits."
        required: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    name: Generate release
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json


  # Publish Docker images when a release is created
  publish-docker:
    name: Publish Docker images (${{ matrix.variant.name }})
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: node
            dockerfile: Dockerfile
            tag_suffix: ""
          - name: bun
            dockerfile: Dockerfile.bun
            tag_suffix: "-bun"
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history for BuildKit cache
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/9router${{ matrix.variant.tag_suffix }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ matrix.variant.tag_suffix == '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}

      - name: Verify image
        run: |
          TAG="ghcr.io/${{ github.repository_owner }}/9router${{ matrix.variant.tag_suffix }}:${{ needs.release-please.outputs.version }}"
          echo "Published: $TAG"
